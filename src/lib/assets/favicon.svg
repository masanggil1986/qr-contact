<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
	<title>LunaLab</title>
	<defs>
		<radialGradient id="bg" cx="34%" cy="28%" r="90%">
			<stop offset="0%" stop-color="#1b1930" />
			<stop offset="100%" stop-color="#0b0a08" />
		</radialGradient>
		<linearGradient id="moon" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#aeb4ff" />
			<stop offset="100%" stop-color="#7c86ff" />
		</linearGradient>
		<mask id="crescent">
			<rect width="128" height="128" fill="black" />
			<circle cx="60" cy="64" r="38" fill="white" />
			<circle cx="82" cy="50" r="34" fill="black" />
		</mask>
		<filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
			<feGaussianBlur stdDeviation="4" result="b" />
			<feMerge>
				<feMergeNode in="b" />
				<feMergeNode in="SourceGraphic" />
			</feMerge>
		</filter>
	</defs>
	<rect width="128" height="128" rx="28" fill="url(#bg)" />
	<circle cx="60" cy="64" r="38" fill="url(#moon)" mask="url(#crescent)" filter="url(#glow)" />
	<circle cx="92" cy="38" r="2.6" fill="#aeb4ff" />
	<circle cx="99" cy="58" r="1.7" fill="#7c86ff" />
</svg>
